<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commander Pods</title>

<style>
body { background:#0f172a; color:#fff; font-family:Arial; margin:0; }
.wrap { max-width:1400px; margin:auto; padding:16px; }
.card { background:#111827; padding:16px; border-radius:12px; margin-bottom:16px; }
.row { display:flex; gap:8px; flex-wrap:wrap; }
input,select,button {
  padding:8px; border-radius:8px; border:1px solid #374151;
  background:#1f2937; color:#fff;
}
button { cursor:pointer; font-weight:bold; }
.small { font-size:12px; }
.pod { border:1px solid #374151; padding:12px; border-radius:10px; margin-top:10px; }
.score { width:70px; }
.badge { padding:4px 8px; border-radius:999px; background:#374151; }
</style>
</head>

<body>
<div class="wrap">

<h2>Commander Pods</h2>

<div class="card">
<div class="row">
<input id="name" placeholder="Player name">
<input id="infamy" type="number" value="0" style="width:80px;">
<button onclick="addPlayer()">Add</button>

<select id="seed">
<option value="random">Random</option>
<option value="infamy">Infamy</option>
</select>

<button onclick="start()">Start</button>
<button onclick="addLate()">Add Late Player</button>
<button onclick="undo()">Undo Round</button>
</div>

<div id="seedBadge" style="margin-top:10px;"></div>
</div>

<div class="card">
<h3>Players</h3>
<div id="players"></div>
</div>

<div class="card">
<h3>Round</h3>
<div id="round"></div>
</div>

<div class="card">
<h3>History</h3>
<div id="history"></div>
</div>

</div>

<script>

let state = {
players: [],
rounds: [],
current: 0,
started:false,
seed:"random"
}

function uid(){ return Math.random().toString(36).slice(2) }

function addPlayer(){
if(state.started) return alert("Use Add Late Player")

state.players.push({
id:uid(),
name:document.getElementById("name").value,
infamy:+document.getElementById("infamy").value,
dropped:false
})
render()
}

function addLate(){
if(!state.started) return alert("Start first")

state.players.push({
id:uid(),
name:document.getElementById("name").value,
infamy:+document.getElementById("infamy").value,
dropped:false
})

alert("Added for next round")
render()
}

function start(){
state.started=true
state.seed=document.getElementById("seed").value
buildRound()
render()
}

function active(){
return state.players.filter(p=>!p.dropped)
}

function buildRound(){

let players=[...active()]

if(state.seed==="random"){
players.sort(()=>Math.random()-0.5)
}else{
players.sort((a,b)=>b.infamy-a.infamy)
}

let pods=[]
while(players.length){
if(players.length===3){
pods.push(players.splice(0,3))
}else{
pods.push(players.splice(0,4))
}
}

state.rounds.push({
pods:pods.map(p=>({
players:p.map(x=>x.id),
scores:Array(p.length).fill("")
})),
done:false
})

state.current=state.rounds.length-1
}

function finalize(){
let r=state.rounds[state.current]

for(let pod of r.pods){
let total=pod.scores.reduce((a,b)=>a+(+b||0),0)
if(total!==10) return alert("Pod must total 10")
}

r.done=true
}

function undo(){
if(!state.rounds.length) return
state.rounds.pop()
state.current=state.rounds.length-1
render()
}

function swap(a,b){
let r=state.rounds[state.current]

for(let pod of r.pods){
for(let i=0;i<pod.players.length;i++){
if(pod.players[i]===a){
for(let pod2 of r.pods){
for(let j=0;j<pod2.players.length;j++){
if(pod2.players[j]===b){

[pod.players[i],pod2.players[j]]=[pod2.players[j],pod.players[i]]
[pod.scores[i],pod2.scores[j]]=[pod2.scores[j],pod.scores[i]]

render()
return
}
}
}
}
}
}

function name(id){
return state.players.find(p=>p.id===id)?.name||"?"
}

function renderPlayers(){
let div=document.getElementById("players")
div.innerHTML=""

state.players.forEach(p=>{
div.innerHTML+=`
<div class="row">
<span>${p.name}</span>
<button onclick="p.dropped=!p.dropped;render()">
${p.dropped?"Undrop":"Drop"}
</button>
</div>`
})
}

function renderRound(){

let div=document.getElementById("round")
div.innerHTML=""

if(!state.rounds.length) return

let r=state.rounds[state.current]

r.pods.forEach((pod,pi)=>{

div.innerHTML+=`<div class="pod"><b>Pod ${pi+1}</b>`

pod.players.forEach((pid,i)=>{

let options = pod.players
.map(x=>x!==pid?`<option value="${x}">${name(x)}</option>`:"")
.join("")

div.innerHTML+=`
<div class="row">
<span>${name(pid)}</span>

<input class="score" value="${pod.scores[i]}"
onchange="state.rounds[${state.current}].pods[${pi}].scores[${i}]=this.value">

<select id="swap_${pid}">
<option value="">swap</option>
${options}
</select>

<button onclick="
let t=document.getElementById('swap_${pid}').value;
if(t) swap('${pid}',t)
">Swap</button>
</div>
`
})

div.innerHTML+=`
<div class="row">
<button onclick="preset(${pi},'default')">Default</button>
<button onclick="preset(${pi},'clear')">Clear</button>
</div>
</div>`
})

div.innerHTML+=`<button onclick="finalize()">Finalize</button>`
}

function preset(pi,type){
let pod=state.rounds[state.current].pods[pi]

if(type==="default"){
if(pod.players.length===4) pod.scores=[4,3,2,1]
if(pod.players.length===3) pod.scores=[4,3,3]
}

if(type==="clear"){
pod.scores=Array(pod.players.length).fill("")
}

render()
}

function renderHistory(){
let div=document.getElementById("history")
div.innerHTML=""

state.rounds.forEach((r,i)=>{
div.innerHTML+=`<div class="pod"><b>Round ${i+1}</b>`
r.pods.forEach(p=>{
div.innerHTML+=`
<div>
${p.players.map((pid,i)=>`${name(pid)} (${p.scores[i]||"-"})`).join(", ")}
</div>`
})
div.innerHTML+=`</div>`
})
}

function renderBadge(){
let b=document.getElementById("seedBadge")

if(!state.started){
b.innerHTML=""
return
}

b.innerHTML=`<span class="badge">
${state.seed==="infamy"?"Infamy Seed":"Random Seed"}
</span>`
}

function render(){
renderPlayers()
renderRound()
renderHistory()
renderBadge()
}

render()

</script>
</body>
</html>
